name: DTW align

on:
  workflow_dispatch:
    inputs:
      song_id:
        description: 'Song id (template at tooling/songs/<song_id>_aligned.json)'
        required: true
        type: string
      validation_target:
        description: 'Which entry in template.validation_targets to use'
        required: false
        type: choice
        default: studio_reference
        options:
          - studio_reference
          - band_recording
      audio_url_override:
        description: 'Optional audio_url to use instead of the one in the template (required when the target has audio_url=null)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  align:
    name: Run offline DTW alignment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tooling/requirements.txt

      - name: Install dependencies
        run: pip install -r tooling/requirements.txt

      - name: Resolve validation target
        id: target
        env:
          SONG_ID: ${{ inputs.song_id }}
          VALIDATION_TARGET: ${{ inputs.validation_target }}
          AUDIO_URL_OVERRIDE: ${{ inputs.audio_url_override }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          if [[ ! -f "$template" ]]; then
            echo "::error::Template not found: $template"
            exit 1
          fi
          # Read validation_targets[<target>]; audio_url_override beats the
          # template's audio_url. Defaults (when validation_targets missing):
          # gt at tooling/ground_truth/<song_id>.json, song_offset 0.0.
          python - <<'PY'
          import json, os, sys
          template_path = f"tooling/songs/{os.environ['SONG_ID']}_aligned.json"
          target = os.environ["VALIDATION_TARGET"]
          override = (os.environ.get("AUDIO_URL_OVERRIDE") or "").strip()
          t = json.loads(open(template_path).read())
          vts = t.get("validation_targets") or {}
          vt = vts.get(target) or {}
          audio_url = override or vt.get("audio_url") or ""
          gt = vt.get("ground_truth_path") or f"tooling/ground_truth/{os.environ['SONG_ID']}.json"
          offset = vt.get("song_offset_sec")
          if offset is None:
              offset = 0.0
          if not audio_url:
              sys.stderr.write(
                  f"::error::validation_target '{target}' has no audio_url. "
                  f"Provide audio_url_override or update the template.\n",
              )
              sys.exit(1)
          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a") as f:
              f.write(f"audio_url={audio_url}\n")
              f.write(f"ground_truth_path={gt}\n")
              f.write(f"song_offset={offset}\n")
          print(f"resolved target={target}")
          print(f"  audio_url         = {audio_url}")
          print(f"  ground_truth_path = {gt}")
          print(f"  song_offset_sec   = {offset}")
          if override:
              print(f"  (audio_url overridden from input)")
          PY

      - name: Download audio
        env:
          AUDIO_URL: ${{ steps.target.outputs.audio_url }}
        run: |
          set -euo pipefail
          url="$AUDIO_URL"
          if [[ "$url" == *"dropbox.com"* ]]; then
            url="${url/?dl=0/?dl=1}"
            case "$url" in
              *\?dl=1*) ;;
              *\?*) url="${url}&dl=1" ;;
              *) url="${url}?dl=1" ;;
            esac
          fi
          mkdir -p dtw
          echo "Downloading audio from: $url"
          # ffmpeg-pre-convert inside the script handles arbitrary containers.
          curl -L --fail --max-time 600 -o dtw/audio "$url"
          ls -la dtw/audio

      - name: Run DTW alignment
        env:
          SONG_ID: ${{ inputs.song_id }}
          GT_PATH: ${{ steps.target.outputs.ground_truth_path }}
          SONG_OFFSET: ${{ steps.target.outputs.song_offset }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          args=(--template "$template" --audio dtw/audio \
                --song-offset "$SONG_OFFSET" \
                --output-md dtw/validation.md \
                --output-json dtw/validation.json \
                -v)
          if [[ -n "${GT_PATH:-}" ]]; then
            if [[ ! -f "$GT_PATH" ]]; then
              echo "::warning::Ground truth not found at $GT_PATH; running without accuracy."
            else
              args+=(--ground-truth "$GT_PATH")
            fi
          fi
          python tooling/dtw_align.py "${args[@]}"
          ls -la dtw/

      - name: Append markdown report to job summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f dtw/validation.md ]]; then
            cat dtw/validation.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload DTW report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dtw-${{ inputs.song_id }}-${{ inputs.validation_target }}
          path: |
            dtw/validation.md
            dtw/validation.json
          if-no-files-found: error
          retention-days: 30
