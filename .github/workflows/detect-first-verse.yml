name: Detect first verse

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'Direct download URL for audio (Dropbox ?dl=0 auto-flipped to ?dl=1)'
        required: true
        type: string
      search_text:
        description: 'Lyric phrase to find (default: opening of Peggy-O)'
        required: false
        type: string
        default: 'as we rode out'
      tap_time:
        description: 'Earliest audio time after which to search, in seconds'
        required: false
        type: number
        default: 0.0
      ground_truth_time:
        description: 'Optional known verse_1 start time, in seconds, for error reporting'
        required: false
        type: number
      whisper_model:
        description: 'Whisper model size'
        required: false
        type: choice
        default: base
        options:
          - tiny
          - base
          - small
      separate_vocals:
        description: 'Run Demucs vocal isolation before Whisper (slower but the recommended path on band audio)'
        required: false
        type: boolean
        default: true
      initial_prompt:
        description: 'Optional Whisper initial_prompt to bias the decoder (explicit wins over template_path)'
        required: false
        type: string
        default: ''
      template_path:
        description: 'Optional path to a built song template JSON; lyrics are used as initial_prompt when set'
        required: false
        type: string
        default: ''
      detection_mode:
        description: 'energy = sustained vocal-onset on the Demucs stem (recommended). whisper = transcribe + fuzzy-match the lyric.'
        required: false
        type: choice
        default: energy
        options:
          - energy
          - whisper
      energy_threshold_db:
        description: 'dBFS threshold for the energy-mode onset detector (default -35.0)'
        required: false
        type: number
        default: -35.0

permissions:
  contents: read

jobs:
  detect:
    name: Run Whisper first-verse probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache Demucs model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub
          key: torch-hub-htdemucs-${{ runner.os }}-v1

      - name: Install Python deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # faster-whisper preferred; openai-whisper is the fallback the
          # script knows how to use if this install ever fails. Demucs
          # pulls torch + torchaudio in as transitive deps.
          pip install "faster-whisper>=1.0" "librosa>=0.10" "rapidfuzz>=3.0" "demucs>=4.0" torchcodec
          python -c "import torch; print('torch', torch.__version__)"

      - name: Download audio
        env:
          AUDIO_URL: ${{ inputs.audio_url }}
        run: |
          set -euo pipefail
          url="$AUDIO_URL"
          if [[ "$url" == *"dropbox.com"* ]]; then
            url="${url/?dl=0/?dl=1}"
            case "$url" in
              *\?dl=1*) ;;
              *\?*) url="${url}&dl=1" ;;
              *) url="${url}?dl=1" ;;
            esac
          fi
          mkdir -p detect
          echo "Downloading audio from: $url"
          # No extension on purpose: detect_first_verse re-encodes via ffmpeg.
          curl -L --fail --max-time 600 -o detect/audio "$url"
          ls -la detect/audio

      - name: Run first-verse detector
        env:
          SEARCH_TEXT: ${{ inputs.search_text }}
          TAP_TIME: ${{ inputs.tap_time }}
          GT_TIME: ${{ inputs.ground_truth_time }}
          WHISPER_MODEL: ${{ inputs.whisper_model }}
          SEPARATE_VOCALS: ${{ inputs.separate_vocals }}
          INITIAL_PROMPT: ${{ inputs.initial_prompt }}
          TEMPLATE_PATH: ${{ inputs.template_path }}
          DETECTION_MODE: ${{ inputs.detection_mode }}
          ENERGY_THRESHOLD: ${{ inputs.energy_threshold_db }}
        run: |
          set -euo pipefail
          args=(--audio detect/audio \
                --detection-mode "$DETECTION_MODE" \
                --energy-threshold-db "$ENERGY_THRESHOLD" \
                --search-text "$SEARCH_TEXT" \
                --tap-time "$TAP_TIME" --model "$WHISPER_MODEL" \
                --output detect/report.json)
          if [[ -n "${GT_TIME:-}" ]]; then
            args+=(--ground-truth-time "$GT_TIME")
          fi
          if [[ "$SEPARATE_VOCALS" == "true" ]]; then
            args+=(--separate-vocals)
          else
            args+=(--no-separate-vocals)
          fi
          if [[ -n "${INITIAL_PROMPT:-}" ]]; then
            args+=(--initial-prompt "$INITIAL_PROMPT")
          fi
          if [[ -n "${TEMPLATE_PATH:-}" ]]; then
            args+=(--template "$TEMPLATE_PATH")
          fi
          python tooling/detect_first_verse.py "${args[@]}" | tee detect/stdout.txt

      - name: Append stdout to job summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f detect/stdout.txt ]]; then
            {
              echo '## Detect first verse'
              echo ''
              echo '```'
              cat detect/stdout.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detect-first-verse-report
          path: |
            detect/report.json
            detect/stdout.txt
          if-no-files-found: warn
          retention-days: 30
