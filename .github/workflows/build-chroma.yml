name: Build chroma reference

on:
  workflow_dispatch:
    inputs:
      song_id:
        description: 'Song id (matches the template basename, e.g. peggy_o)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Compute chroma + commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tooling/requirements.txt

      - name: Install dependencies
        run: pip install -r tooling/requirements.txt

      - name: Compute chroma reference
        env:
          SONG_ID: ${{ inputs.song_id }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          if [[ ! -f "$template" ]]; then
            echo "::error::Template not found: $template"
            exit 1
          fi
          python tooling/chroma_template.py --template "$template"
          ls -la "$template"

      - name: Commit updated template
        env:
          SONG_ID: ${{ inputs.song_id }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "$template"; then
            echo "No changes to commit."
            exit 0
          fi
          git add "$template"
          git commit -m "Add chroma_reference to ${SONG_ID} template

          Generated by .github/workflows/build-chroma.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
