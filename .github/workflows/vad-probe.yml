name: Silero VAD probe

# Rung 2 of the live vocal-onset ladder: can Silero VAD (lightweight,
# CPU-fast, live-viable) separate SUNG vocals from an instrumental jam
# on raw phone-mic audio? Runs tooling/vad_probe.py. Deliberately NO
# Demucs / source separation anywhere in this workflow.

on:
  workflow_dispatch:
    inputs:
      audio_url:
        description: 'Direct download URL for audio (Dropbox ?dl=0 auto-flipped to ?dl=1)'
        required: true
        type: string
      song_id:
        description: 'Song id, used to locate the default ground-truth file'
        required: true
        type: string
        default: peggy_o
      ground_truth_path:
        description: 'Ground-truth JSON path (default: tooling/ground_truth/{song_id}_band.json)'
        required: false
        type: string
        default: ''
      song_offset:
        description: 'Ignore audio before this time, in seconds (pre-song noodling)'
        required: false
        type: number
        default: 20.0

permissions:
  contents: read

jobs:
  probe:
    name: Run Silero VAD probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          # CPU-only torch first: silero-vad declares torch as a dep and
          # the default wheel would drag in the multi-GB CUDA build.
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install "silero-vad>=5.0" "onnxruntime>=1.16" \
            "librosa>=0.10" "soundfile>=0.12" "scipy>=1.10" "numpy>=1.24"

      - name: Download audio
        env:
          AUDIO_URL: ${{ inputs.audio_url }}
        run: |
          set -euo pipefail
          url="$AUDIO_URL"
          if [[ "$url" == *"dropbox.com"* ]]; then
            url="${url/?dl=0/?dl=1}"
            case "$url" in
              *\?dl=1*) ;;
              *\?*) url="${url}&dl=1" ;;
              *) url="${url}?dl=1" ;;
            esac
          fi
          mkdir -p vad
          echo "Downloading audio from: $url"
          # No extension on purpose: vad_probe re-encodes via ffmpeg.
          curl -L --fail --max-time 600 -o vad/audio "$url"
          ls -la vad/audio

      - name: Run VAD probe
        env:
          SONG_ID: ${{ inputs.song_id }}
          GT_PATH: ${{ inputs.ground_truth_path }}
          SONG_OFFSET: ${{ inputs.song_offset }}
        run: |
          set -euo pipefail
          gt_path="${GT_PATH:-tooling/ground_truth/${SONG_ID}_band.json}"
          python tooling/vad_probe.py \
            --audio vad/audio \
            --ground-truth "$gt_path" \
            --song-offset "$SONG_OFFSET" \
            --output-md vad/vad_probe.md \
            --output-json vad/vad_probe.json | tee vad/stdout.txt

      - name: Append report to job summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f vad/vad_probe.md ]]; then
            cat vad/vad_probe.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vad-probe-report
          path: vad/
          if-no-files-found: warn
          retention-days: 30
