name: Cross-recording probe

# Rung 3b of the live vocal-onset ladder: does the mel vocal-presence
# head generalize across recordings? Trains on a labeled take, detects
# on a different one, and scores against known timestamps. NO source
# separation, no torch -- librosa + scikit-learn only.

on:
  workflow_dispatch:
    inputs:
      train_audio_url:
        description: 'Direct download URL for the labeled TRAIN recording'
        required: true
        type: string
      test_audio_url:
        description: 'Direct download URL for the TEST recording (never seen in training)'
        required: true
        type: string
      song_id:
        description: 'Song id, used to locate the default train ground-truth file'
        required: true
        type: string
        default: peggy_o
      ground_truth_path:
        description: 'Train ground-truth JSON path (default: tooling/ground_truth/{song_id}_band.json)'
        required: false
        type: string
        default: ''
      expected_verse_1_sec:
        description: 'Known first-verse vocal start in the test recording, seconds (optional)'
        required: false
        type: string
        default: ''
      expected_verse_5_sec:
        description: 'Known post-jam re-entry in the test recording, seconds (optional, the critical timestamp)'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  probe:
    name: Run cross-recording probe
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "librosa>=0.10" "soundfile>=0.12" "scipy>=1.10" \
            "numpy>=1.24" "scikit-learn>=1.3"

      - name: Download audio
        env:
          TRAIN_URL: ${{ inputs.train_audio_url }}
          TEST_URL: ${{ inputs.test_audio_url }}
        run: |
          set -euo pipefail
          fetch() {
            local url="$1" out="$2"
            if [[ "$url" == *"dropbox.com"* ]]; then
              url="${url/?dl=0/?dl=1}"
              case "$url" in
                *\?dl=1*) ;;
                *dl=1*) ;;
                *\?*) url="${url}&dl=1" ;;
                *) url="${url}?dl=1" ;;
              esac
            fi
            echo "Downloading: $url"
            curl -L --fail --max-time 600 -o "$out" "$url"
          }
          mkdir -p xrec
          fetch "$TRAIN_URL" xrec/train_audio
          fetch "$TEST_URL" xrec/test_audio
          ls -la xrec/

      - name: Run cross-recording probe
        env:
          SONG_ID: ${{ inputs.song_id }}
          GT_PATH: ${{ inputs.ground_truth_path }}
          EXPECTED_V1: ${{ inputs.expected_verse_1_sec }}
          EXPECTED_V5: ${{ inputs.expected_verse_5_sec }}
        run: |
          set -euo pipefail
          gt_path="${GT_PATH:-tooling/ground_truth/${SONG_ID}_band.json}"
          args=(--train-audio xrec/train_audio \
                --train-ground-truth "$gt_path" \
                --test-audio xrec/test_audio \
                --output-md xrec/xrec_probe.md \
                --output-json xrec/xrec_probe.json)
          if [[ -n "${EXPECTED_V1:-}" ]]; then
            args+=(--expected-verse-1-sec "$EXPECTED_V1")
          fi
          if [[ -n "${EXPECTED_V5:-}" ]]; then
            args+=(--expected-verse-5-sec "$EXPECTED_V5")
          fi
          python tooling/xrec_probe.py "${args[@]}" | tee xrec/stdout.txt

      - name: Append report to job summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f xrec/xrec_probe.md ]]; then
            cat xrec/xrec_probe.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xrec-probe-report
          path: xrec/
          if-no-files-found: warn
          retention-days: 30
