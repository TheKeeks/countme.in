name: Add a song

on:
  workflow_dispatch:
    inputs:
      song:
        description: 'Song slug or name (e.g. peggy-o)'
        required: true
        type: string
      query:
        description: 'Optional natural-language query (e.g. "5/5/77 New Haven")'
        required: false
        type: string
      count:
        description: 'Number of references to fetch'
        required: false
        type: string
        default: '2'
      era:
        description: 'Year range, e.g. 1977-1981'
        required: false
        type: string
      source:
        description: 'Which source to pull from'
        required: false
        type: choice
        default: auto
        options:
          - auto
          - relisten
          - archive
          - youtube
      band_recording_url:
        description: 'Optional URL to a band reference recording (e.g. Dropbox share)'
        required: false
        type: string
      commit_template:
        description: 'Commit the built template to web/templates/ on success'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tooling/requirements.txt

      - name: Install dependencies
        run: pip install -r tooling/requirements.txt

      - name: Resolve song slug
        id: slug
        env:
          SONG: ${{ inputs.song }}
        run: |
          set -euo pipefail
          slug=$(python -c "import re,sys,unicodedata; s=unicodedata.normalize('NFKD',sys.argv[1]).encode('ascii','ignore').decode(); print(re.sub(r'[^a-z0-9]+','_',s.lower()).strip('_'))" "$SONG")
          echo "song_slug=$slug" >> "$GITHUB_OUTPUT"
          echo "out_dir=tooling/references/$slug" >> "$GITHUB_OUTPUT"
          echo "lyrics_path=tooling/songs/${slug}.lyrics" >> "$GITHUB_OUTPUT"
          echo "template_path=web/templates/${slug}_aligned.json" >> "$GITHUB_OUTPUT"

      - name: Fetch references
        id: fetch
        env:
          SONG: ${{ inputs.song }}
          QUERY: ${{ inputs.query }}
          COUNT: ${{ inputs.count }}
          ERA: ${{ inputs.era }}
          SOURCE: ${{ inputs.source }}
        run: |
          set -euo pipefail
          args=(--song "$SONG" --count "$COUNT" --source "$SOURCE" -v)
          if [[ -n "${QUERY:-}" ]]; then
            args+=(--query "$QUERY")
          fi
          if [[ -n "${ERA:-}" ]]; then
            args+=(--era "$ERA")
          fi
          python tooling/fetch_references.py "${args[@]}"

      - name: Download band recording
        if: ${{ inputs.band_recording_url != '' }}
        env:
          BAND_URL: ${{ inputs.band_recording_url }}
          OUT_DIR: ${{ steps.slug.outputs.out_dir }}
        run: |
          set -euo pipefail
          mkdir -p "$OUT_DIR"
          # Dropbox share URLs serve a preview page on ?dl=0; flip to ?dl=1.
          url="$BAND_URL"
          if [[ "$url" == *"dropbox.com"* ]]; then
            url="${url/?dl=0/?dl=1}"
            case "$url" in
              *\?dl=1*) ;;
              *\?*) url="${url}&dl=1" ;;
              *) url="${url}?dl=1" ;;
            esac
          fi
          dest="$OUT_DIR/band_recording.mp3"
          echo "Downloading band recording from: $url"
          curl -L --fail --max-time 600 -o "$dest" "$url"
          ls -la "$dest"

      - name: Summarise downloads
        env:
          OUT_DIR: ${{ steps.slug.outputs.out_dir }}
          SONG_SLUG: ${{ steps.slug.outputs.song_slug }}
        run: |
          set -euo pipefail
          if [[ ! -d "$OUT_DIR" ]] || [[ -z "$(ls -A "$OUT_DIR" 2>/dev/null)" ]]; then
            echo "::error::No references in $OUT_DIR"
            exit 1
          fi

          {
            echo "## Add a song -- $SONG_SLUG"
            echo ""
            echo "### References"
            echo ""
            ls -1 "$OUT_DIR"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "Files in $OUT_DIR:"
          ls -la "$OUT_DIR"

      - name: Upload references artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: references-${{ steps.slug.outputs.song_slug }}
          path: ${{ steps.slug.outputs.out_dir }}
          if-no-files-found: warn
          retention-days: 14

      - name: Check lyrics file
        id: lyrics
        env:
          LYRICS_PATH: ${{ steps.slug.outputs.lyrics_path }}
        run: |
          set -euo pipefail
          if [[ ! -f "$LYRICS_PATH" ]]; then
            echo "::warning::Lyrics file $LYRICS_PATH not found -- skipping template build."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build song template
        id: build
        if: ${{ steps.lyrics.outputs.found == 'true' }}
        env:
          SONG_SLUG: ${{ steps.slug.outputs.song_slug }}
          OUT_DIR: ${{ steps.slug.outputs.out_dir }}
          LYRICS_PATH: ${{ steps.slug.outputs.lyrics_path }}
          TEMPLATE_PATH: ${{ steps.slug.outputs.template_path }}
        run: |
          set -euo pipefail
          python tooling/build_song.py \
            --song "$SONG_SLUG" \
            --references "$OUT_DIR/*.mp3" \
            --lyrics "$LYRICS_PATH" \
            --out "$TEMPLATE_PATH" \
            -v

      - name: Upload template artifact
        if: ${{ steps.build.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: template-${{ steps.slug.outputs.song_slug }}
          path: ${{ steps.slug.outputs.template_path }}
          if-no-files-found: error
          retention-days: 90

      - name: Commit template to repo
        if: ${{ steps.build.outcome == 'success' && inputs.commit_template }}
        env:
          TEMPLATE_PATH: ${{ steps.slug.outputs.template_path }}
          SONG_SLUG: ${{ steps.slug.outputs.song_slug }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Bail if nothing to commit (idempotent re-runs).
          if git diff --quiet -- "$TEMPLATE_PATH"; then
            if ! git ls-files --error-unmatch "$TEMPLATE_PATH" >/dev/null 2>&1; then
              git add "$TEMPLATE_PATH"
            fi
          else
            git add "$TEMPLATE_PATH"
          fi
          if git diff --cached --quiet; then
            echo "No template changes to commit."
            exit 0
          fi

          git commit -m "Add/update template for ${SONG_SLUG}

          Generated by .github/workflows/add-song.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
