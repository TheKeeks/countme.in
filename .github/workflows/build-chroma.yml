name: Build chroma reference

on:
  workflow_dispatch:
    inputs:
      song_id:
        description: 'Song id (matches the template basename, e.g. peggy_o)'
        required: true
        type: string
      audio_url_override:
        description: 'Optional reference audio URL. Defaults to template.validation_targets.studio_reference.audio_url. Required when the template has no validation_targets.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Compute chroma + commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tooling/requirements.txt

      - name: Install dependencies
        run: pip install -r tooling/requirements.txt

      - name: Resolve reference audio URL
        id: target
        env:
          SONG_ID: ${{ inputs.song_id }}
          AUDIO_URL_OVERRIDE: ${{ inputs.audio_url_override }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          if [[ ! -f "$template" ]]; then
            echo "::error::Template not found: $template"
            exit 1
          fi
          # Resolve from validation_targets.studio_reference.audio_url unless
          # the user supplied audio_url_override. Backward-compat: templates
          # with no validation_targets force the user to supply the override.
          python - <<'PY'
          import json, os, sys
          template_path = f"tooling/songs/{os.environ['SONG_ID']}_aligned.json"
          override = (os.environ.get("AUDIO_URL_OVERRIDE") or "").strip()
          t = json.loads(open(template_path).read())
          vts = t.get("validation_targets") or {}
          vt = vts.get("studio_reference") or {}
          audio_url = override or vt.get("audio_url") or ""
          if not audio_url:
              sys.stderr.write(
                  "::error::Template has no validation_targets.studio_reference.audio_url. "
                  "Provide audio_url_override on this run.\n",
              )
              sys.exit(1)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"audio_url={audio_url}\n")
          print(f"resolved audio_url = {audio_url}")
          if override:
              print("(overridden from input)")
          PY

      - name: Download reference audio
        env:
          SONG_ID: ${{ inputs.song_id }}
          AUDIO_URL: ${{ steps.target.outputs.audio_url }}
        run: |
          set -euo pipefail
          url="$AUDIO_URL"
          if [[ "$url" == *"dropbox.com"* ]]; then
            url="${url/?dl=0/?dl=1}"
            case "$url" in
              *\?dl=1*) ;;
              *\?*) url="${url}&dl=1" ;;
              *) url="${url}?dl=1" ;;
            esac
          fi
          mkdir -p "tooling/references/${SONG_ID}"
          dest="tooling/references/${SONG_ID}/reference_audio"
          echo "Downloading reference audio from: $url"
          # No extension on purpose: librosa+ffmpeg sniff the container.
          curl -L --fail --max-time 600 -o "$dest" "$url"
          ls -la "$dest"

      - name: Compute chroma reference
        env:
          SONG_ID: ${{ inputs.song_id }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          if [[ ! -f "$template" ]]; then
            echo "::error::Template not found: $template"
            exit 1
          fi
          python tooling/chroma_template.py \
            --template "$template" \
            --audio "tooling/references/${SONG_ID}/reference_audio"
          ls -la "$template"

      - name: Commit updated template
        env:
          SONG_ID: ${{ inputs.song_id }}
        run: |
          set -euo pipefail
          template="tooling/songs/${SONG_ID}_aligned.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- "$template"; then
            echo "No changes to commit."
            exit 0
          fi
          git add "$template"
          git commit -m "Add chroma_reference to ${SONG_ID} template

          Generated by .github/workflows/build-chroma.yml on $(date -u +%Y-%m-%dT%H:%M:%SZ)."
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
