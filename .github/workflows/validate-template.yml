name: Validate template

on:
  workflow_dispatch:
    inputs:
      template_path:
        description: 'Path to the template JSON to validate against'
        required: false
        type: string
        default: 'web/templates/peggy_o_aligned.json'
      audio_url:
        description: 'Direct download URL for the audio to validate (Dropbox ?dl=0 is auto-flipped to ?dl=1)'
        required: true
        type: string
      song_slug:
        description: 'Song slug (used to name the output files)'
        required: false
        type: string
        default: 'peggy-o'
      song_offset:
        description: 'Seconds of pre-song audio to skip when applying the time prior'
        required: false
        type: number
        default: 0.0

permissions:
  contents: read

jobs:
  validate:
    name: Score windows against template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tooling/requirements.txt

      - name: Install dependencies
        run: pip install -r tooling/requirements.txt

      - name: Download audio
        env:
          AUDIO_URL: ${{ inputs.audio_url }}
        run: |
          set -euo pipefail
          url="$AUDIO_URL"
          if [[ "$url" == *"dropbox.com"* ]]; then
            url="${url/?dl=0/?dl=1}"
            case "$url" in
              *\?dl=1*) ;;
              *\?*) url="${url}&dl=1" ;;
              *) url="${url}?dl=1" ;;
            esac
          fi
          mkdir -p validation
          echo "Downloading audio from: $url"
          # No extension on purpose: the script sniffs format from magic bytes.
          curl -L --fail --max-time 600 -o validation/band_recording "$url"
          ls -la validation/band_recording

      - name: Run validate_position
        env:
          TEMPLATE: ${{ inputs.template_path }}
          SLUG: ${{ inputs.song_slug }}
          SONG_OFFSET: ${{ inputs.song_offset }}
        run: |
          set -euo pipefail
          if [[ ! -f "$TEMPLATE" ]]; then
            echo "::error::Template not found: $TEMPLATE"
            exit 1
          fi
          # GT files are named with the song_id (underscore form) -- match
          # the slug-normalisation the add-song workflow uses.
          gt_slug=$(python -c "import re,sys,unicodedata; s=unicodedata.normalize('NFKD',sys.argv[1]).encode('ascii','ignore').decode(); print(re.sub(r'[^a-z0-9]+','_',s.lower()).strip('_'))" "$SLUG")
          gt_path="tooling/ground_truth/${gt_slug}.json"
          args=(--template "$TEMPLATE" --audio validation/band_recording \
                --out "validation/${SLUG}_validation" \
                --song-offset "$SONG_OFFSET" -v)
          if [[ -f "$gt_path" ]]; then
            echo "Found ground truth: $gt_path"
            args+=(--ground-truth "$gt_path")
          else
            echo "No ground truth at $gt_path; accuracy stats will be omitted."
          fi
          python tooling/validate_position.py "${args[@]}"
          ls -la validation/

      - name: Append markdown report to summary
        if: always()
        env:
          SLUG: ${{ inputs.song_slug }}
        run: |
          set -euo pipefail
          md="validation/${SLUG}_validation.md"
          if [[ -f "$md" ]]; then
            cat "$md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: |
            validation/${{ inputs.song_slug }}_validation.csv
            validation/${{ inputs.song_slug }}_validation.md
            validation/${{ inputs.song_slug }}_validation.html
          if-no-files-found: error
          retention-days: 30
